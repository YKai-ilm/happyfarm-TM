<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="開心農場" />
    <meta name="theme-color" content="#cf4b3f" />
    <title>開心農場</title>
    <link rel="stylesheet" href="./styles.css?v=20260615-claude-029" />
  </head>
  <body>
    <div class="farm-app">
      <header class="topbar">
        <nav class="main-nav" aria-label="主選單">
          <button class="nav-button is-active" type="button" data-menu-action="profile">角色設定</button>
          <button class="nav-button" type="button" data-menu-action="farm">農場設定</button>
          <button class="nav-button" type="button" data-menu-action="invite">邀請好友</button>
          <button class="nav-button" type="button" data-tab="market">農民市集</button>
          <button class="nav-button" type="button" data-menu-action="save">存檔備份</button>
          <button class="nav-button" type="button" data-menu-action="notice">常見問題</button>
          <button class="nav-button" type="button" data-menu-action="redeem">兌換碼</button>
        </nav>

        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path d="M8 28 32 10l24 18v28H8z" fill="#cf4b3f" />
              <path d="M8 28 32 10l24 18" fill="none" stroke="#703629" stroke-width="4" stroke-linejoin="round" />
              <path d="M24 56V36h16v20" fill="#f4c66a" />
              <path d="M18 56V42h8v14M38 56V42h8v14" fill="#ffe09a" opacity=".8" />
              <path d="M29 20h6v9h-6z" fill="#f7efe3" />
            </svg>
          </span>
          <div>
            <h1>開心農場</h1>
            <p id="statusLine">選工具後點田地操作。</p>
          </div>
        </div>

        <div class="stats-bar" aria-label="農場狀態">
          <div class="stat-pill">
            <span class="stat-icon" aria-hidden="true" data-icon="coin"></span>
            <strong id="coinValue">0</strong>
          </div>
          <div class="level-stat">
            <span id="levelValue">Lv. 1</span>
            <div class="xp-track" aria-hidden="true">
              <span id="xpFill"></span>
            </div>
          </div>
          <button class="icon-button" id="restButton" type="button" title="休息一天" aria-label="休息一天">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.2 14.4A8.2 8.2 0 0 1 9.6 3.8 8.3 8.3 0 1 0 20.2 14.4z" fill="currentColor" />
            </svg>
          </button>
        </div>

        <div class="topbar-status" aria-label="目前天氣">
          <span class="topbar-stat">目前天氣 <strong id="weatherValue">晴朗</strong></span>
        </div>
      </header>

      <main class="game-layout">
        <section class="panel inventory-panel" aria-label="倉庫">
          <div class="inv-split">
            <div class="inv-col damaged-col">
              <div class="panel-head"><h2>災損作物</h2></div>
              <div id="damagedList" class="inventory-list"></div>
            </div>
            <div class="inv-col stock-col">
              <div class="panel-head">
                <h2>倉庫</h2>
                <button class="compact-button" id="sellAllButton" type="button">
                  <span class="button-icon" aria-hidden="true" data-icon="cart"></span>
                  全部出售
                </button>
              </div>
              <div id="inventoryList" class="inventory-list"></div>
            </div>
          </div>
        </section>

        <section class="farm-stage" aria-label="農場場景">
          <div class="scene-toolbar scene-toolbar-top" role="toolbar" aria-label="圖例功能">
            <div class="scene-status-strip" aria-label="農場狀態">
              <span class="scene-stat">目前天氣 <strong id="sceneWeatherValue">晴朗</strong></span>
              <span class="scene-stat">農場日 <strong id="sceneDayValue">第 1 天</strong></span>
            </div>
            <div class="scene-brand" aria-label="目前農場">
              <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 64 64" role="img">
                  <path d="M8 28 32 10l24 18v28H8z" fill="#cf4b3f" />
                  <path d="M8 28 32 10l24 18" fill="none" stroke="#703629" stroke-width="4" stroke-linejoin="round" />
                  <path d="M24 56V36h16v20" fill="#f4c66a" />
                  <path d="M18 56V42h8v14M38 56V42h8v14" fill="#ffe09a" opacity=".8" />
                  <path d="M29 20h6v9h-6z" fill="#f7efe3" />
                </svg>
              </span>
              <div>
                <h1>開心農場</h1>
                <p id="sceneStatusLine">選工具後點田地操作。</p>
              </div>
            </div>
            <div class="scene-stats" aria-label="農場資源">
              <span class="scene-stat-pill">
                <span class="stat-icon" aria-hidden="true" data-icon="coin"></span>
                <strong id="sceneCoinValue">0</strong>
              </span>
              <span class="scene-level-pill">
                <strong id="sceneLevelValue">Lv. 1</strong>
                <span class="scene-xp-track" aria-hidden="true"><span id="sceneXpFill"></span></span>
              </span>
            </div>
            <button class="scene-action" type="button" data-action="gift">
              <span class="button-icon" aria-hidden="true" data-icon="gift"></span>
              禮包
            </button>
            <button class="scene-action" type="button" data-action="item">
              <span class="button-icon" aria-hidden="true" data-icon="item"></span>
              道具
            </button>
            <button class="scene-action" type="button" data-panel-target="inventory">
              <span class="button-icon" aria-hidden="true" data-icon="basket"></span>
              倉庫
            </button>
            <button class="scene-action" type="button" data-tab="shop">
              <span class="button-icon" aria-hidden="true" data-icon="seed"></span>
              種子
            </button>
            <button class="scene-action" type="button" data-tab="orders">
              <span class="button-icon" aria-hidden="true" data-icon="cart"></span>
              訂單
            </button>
            <button class="scene-action" type="button" data-tab="upgrades">
              <span class="button-icon" aria-hidden="true" data-icon="hammer"></span>
              升級
            </button>
            <button class="scene-action" type="button" data-action="friends">
              <span class="button-icon" aria-hidden="true" data-icon="star"></span>
              好友
            </button>
            <button class="scene-action" type="button" data-action="gm">
              <span class="button-icon" aria-hidden="true" data-icon="sun"></span>
              特殊
            </button>
          </div>

          <div class="field-frame">
            <button class="barn-hotspot" type="button" data-panel-target="inventory" aria-label="開啟倉庫" title="開啟倉庫"></button>
            <div id="farmGrid" class="farm-grid"></div>
          </div>

          <div class="bottom-tool-row" role="toolbar" aria-label="農場操作">
            <button class="tool-button is-active" data-tool="seed" type="button" title="種植">
              <span class="button-icon" aria-hidden="true" data-icon="hoe"></span>
              種植
            </button>
            <button class="tool-button" data-tool="water" type="button" title="澆水">
              <span class="button-icon" aria-hidden="true" data-icon="watering"></span>
              澆水
            </button>
            <button class="tool-button" data-tool="harvest" type="button" title="收成">
              <span class="button-icon" aria-hidden="true" data-icon="basket"></span>
              收成
            </button>
            <button class="tool-button" type="button" data-tab="shop" title="換種子">
              <span class="button-icon" aria-hidden="true" data-icon="cart"></span>
              換種子
            </button>
            <button class="tool-button" type="button" data-action="sell-all" title="全部出售">
              <span class="button-icon" aria-hidden="true" data-icon="coin"></span>
              出售
            </button>
          </div>
        </section>

        <aside class="panel work-panel" aria-label="農場管理">
          <div class="panel-head work-panel-head">
            <h2 id="workPanelTitle">種子</h2>
          </div>
          <div class="tabs" role="tablist" aria-label="管理分頁">
            <button class="tab is-active" data-tab="shop" type="button">種子</button>
            <button class="tab" data-tab="market" type="button">市集</button>
            <button class="tab" data-tab="orders" type="button">訂單</button>
            <button class="tab" data-tab="upgrades" type="button">升級</button>
          </div>
          <div id="tabContent" class="tab-content"></div>
        </aside>
      </main>

      <div id="toastZone" class="toast-zone" aria-live="polite" aria-atomic="true"></div>
    </div>

    <div id="saveBox" class="save-box" hidden>
      <div class="save-card" role="dialog" aria-modal="true" aria-label="存檔備份">
        <h2>存檔備份</h2>
        <p>遊戲進度會自動存在這台裝置。把進度複製成「備份碼」另外保存，換手機或瀏覽器被清掉時就能還原。</p>
        <div class="save-actions">
          <button id="exportCodeBtn" type="button" class="save-primary">複製備份碼</button>
          <button id="importCodeBtn" type="button" class="save-secondary">貼備份碼還原</button>
        </div>
        <button id="saveBoxClose" type="button" class="save-close">關閉</button>
      </div>
    </div>

    <div id="giftBox" class="gift-box" hidden>
      <div class="gift-card" role="dialog" aria-modal="true" aria-label="禮包">
        <h2>🎁 禮包</h2>
        <p>點各分類展開領取，已領取的會自動移除。</p>
        <div id="giftList" class="gift-list"></div>
        <button id="giftClose" type="button" class="gift-close">關閉</button>
      </div>
    </div>

    <div id="spinBox" class="spin-box" hidden>
      <div class="spin-card" role="dialog" aria-modal="true" aria-label="開場轉盤">
        <h2>🎡 開場轉盤</h2>
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div id="wheelRotor" class="wheel-rotor"></div>
        </div>
        <p id="spinResult" class="spin-result" aria-live="polite"></p>
        <button id="spinGo" type="button" class="spin-go">轉動！</button>
        <button id="spinClose" type="button" class="spin-close" hidden>收下獎勵</button>
      </div>
    </div>

    <div id="itemBox" class="gift-box" hidden>
      <div class="gift-card" role="dialog" aria-modal="true" aria-label="道具">
        <h2>🧪 道具</h2>
        <p>抽轉盤或活動取得的道具會放在這裡。</p>
        <div id="itemList" class="gift-list"></div>
        <button id="itemClose" type="button" class="gift-close">關閉</button>
      </div>
    </div>

    <div id="friendsBox" class="gift-box" hidden>
      <div class="gift-card" role="dialog" aria-modal="true" aria-label="好友">
        <h2>🧑‍🌾 好友</h2>
        <p>拜訪好友農場，可以偷菜、幫忙賺獎勵。</p>
        <div id="friendsList" class="friends-list"></div>
        <div class="friend-add">
          <input id="friendNameInput" type="text" maxlength="12" placeholder="輸入名稱新增好友" />
          <button id="friendAddBtn" type="button">新增</button>
        </div>
        <button id="friendsClose" type="button" class="gift-close">關閉</button>
      </div>
    </div>

    <div id="friendFarmBox" class="gift-box" hidden>
      <div class="gift-card" role="dialog" aria-modal="true" aria-label="好友農場">
        <h2 id="friendFarmTitle">好友的農場</h2>
        <div id="friendFarmGrid" class="ff-grid"></div>
        <button id="friendFarmBack" type="button" class="gift-close">返回</button>
      </div>
    </div>

    <div id="gmBadge" class="gm-badge" hidden>🛠️ GM 模式</div>

    <div id="gmPanel" class="gm-box" hidden>
      <div class="gm-card" role="dialog" aria-modal="true" aria-label="GM 模式">
        <h2>🛠️ GM 模式</h2>
        <div class="gm-actions">
          <button id="gmEditBtn" type="button" class="gm-primary">修改數據</button>
          <button id="gmResetBtn" type="button" class="gm-secondary">重置遊戲</button>
          <button id="gmTodoBtn" type="button" class="gm-secondary" disabled>待新增</button>
          <button id="gmExitBtn" type="button" class="gm-danger">關閉 GM 模式</button>
        </div>
        <button id="gmPanelClose" type="button" class="gm-close">關閉視窗（保留 GM）</button>
      </div>
    </div>

    <div id="gmEdit" class="gm-box" hidden>
      <div class="gm-card gm-edit-card" role="dialog" aria-modal="true" aria-label="修改數據">
        <h2>修改數據</h2>
        <div class="gm-field">
          <label>金幣</label>
          <div class="gm-ctrl">
            <button class="gm-step" data-gm-dec="coins" type="button">−</button>
            <input class="gm-num" data-gm-num="coins" type="number" inputmode="numeric" />
            <button class="gm-step" data-gm-inc="coins" type="button">＋</button>
          </div>
          <input class="gm-slider" data-gm-range="coins" type="range" />
        </div>
        <div class="gm-field">
          <label>等級</label>
          <div class="gm-ctrl">
            <button class="gm-step" data-gm-dec="level" type="button">−</button>
            <input class="gm-num" data-gm-num="level" type="number" inputmode="numeric" />
            <button class="gm-step" data-gm-inc="level" type="button">＋</button>
          </div>
          <input class="gm-slider" data-gm-range="level" type="range" />
        </div>
        <div class="gm-field">
          <label>經驗</label>
          <div class="gm-ctrl">
            <button class="gm-step" data-gm-dec="xp" type="button">−</button>
            <input class="gm-num" data-gm-num="xp" type="number" inputmode="numeric" />
            <button class="gm-step" data-gm-inc="xp" type="button">＋</button>
          </div>
          <input class="gm-slider" data-gm-range="xp" type="range" />
        </div>
        <div class="gm-row"><label>天氣</label><span class="gm-weather"><button data-gm-weather="sun" type="button">晴朗</button><button data-gm-weather="breeze" type="button">微風</button><button data-gm-weather="cloud" type="button">多雲</button><button data-gm-weather="rain" type="button">小雨</button><button data-gm-weather="scorch" type="button">烈日</button><button data-gm-weather="storm" type="button">雷雨</button><button data-gm-weather="fog" type="button">起霧</button><button data-gm-weather="snow" type="button">下雪</button><button data-gm-weather="typhoon" type="button">颱風</button></span></div>
        <div class="gm-row"><label>庫存</label><button id="gmInvOpen" type="button">編輯庫存…</button></div>
        <div class="gm-row"><label>訂單</label><button id="gmOrderRefresh" type="button">刷新訂單</button></div>
        <div class="gm-foot">
          <button id="gmEditConfirm" type="button" class="gm-foot-ok">確定</button>
          <button id="gmEditRevert" type="button" class="gm-foot-undo">回復</button>
          <button id="gmEditBack" type="button" class="gm-foot-back">返回</button>
        </div>
      </div>
    </div>

    <div id="gmInvBox" class="gm-box" hidden>
      <div class="gm-card gm-edit-card" role="dialog" aria-modal="true" aria-label="庫存">
        <h2>庫存</h2>
        <div id="gmInvList" class="gm-inv-list"></div>
        <div class="gm-foot">
          <button id="gmInvConfirm" type="button" class="gm-foot-ok">確定</button>
          <button id="gmInvRevert" type="button" class="gm-foot-undo">回復</button>
          <button id="gmInvBack" type="button" class="gm-foot-back">返回</button>
        </div>
      </div>
    </div>

    <script src="./game.js?v=20260615-claude-029"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
