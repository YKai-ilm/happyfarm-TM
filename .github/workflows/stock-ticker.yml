name: Stock Ticker
on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分鐘(UTC)；GitHub 可能延遲幾分鐘
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: stock-ticker
        run: npm install --no-audit --no-fund
      - name: Publish stock prices
        working-directory: stock-ticker
        env:
          STOCK_SECRET: ${{ secrets.STOCK_SECRET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
